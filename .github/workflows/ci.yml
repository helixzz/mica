name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  denylist:
    name: Tenant-name denylist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for banned tenant identifiers
        run: |
          set -e
          # Patterns are obfuscated (character classes / hex) so that this
          # workflow file does not itself trip the scan.
          PATTERNS='[J][Q][P][A]|[j][q][p][a]|jqdomain|\xe4\xbd\xb3\xe6\x9c\x9f'
          if grep -rnP "$PATTERNS" \
               --exclude-dir=.git --exclude-dir=node_modules \
               --exclude-dir=dist --exclude-dir=__pycache__ \
               --exclude='.denylist' --exclude='ci.yml' . ; then
            echo "::error::Banned tenant identifier found. See .denylist for policy."
            exit 1
          fi
          echo "Denylist scan clean."

  backend:
    name: Backend lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: backend
        run: ruff check app
      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app

  backend-test:
    name: Backend tests + coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mica
          POSTGRES_PASSWORD: mica
          POSTGRES_DB: mica_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://mica:mica@localhost:5432/mica_test
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=term --cov-fail-under=70
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Type check
        working-directory: frontend
        run: npm run type-check
      - name: Build
        working-directory: frontend
        run: npm run build

  frontend-test:
    name: Frontend tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Run vitest with coverage
        working-directory: frontend
        run: npm run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
        continue-on-error: true

  docker:
    name: Docker compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        working-directory: deploy
        run: |
          cp .env.example .env
          docker compose build

  e2e-smoke:
    name: E2E smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend, backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - name: Start services
        working-directory: deploy
        run: |
          cp .env.example .env
          cp nginx/conf.d/mica.conf.default nginx/conf.d/mica.conf
          docker compose up -d --build --wait
          sleep 10
      - name: Health check
        run: |
          curl -sf http://localhost:8900/ > /dev/null
          curl -sf -X POST http://localhost:8900/api/v1/auth/login \
            -d 'username=admin&password=MicaDev2026!' | python3 -c "import sys,json;d=json.load(sys.stdin);assert 'access_token' in d, f'Login failed: {d}'"
          echo "✅ E2E smoke: frontend serves, API login works"
      - name: API endpoint smoke
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8900/api/v1/auth/login \
            -d 'username=alice&password=MicaDev2026!' | python3 -c "import sys,json;print(json.load(sys.stdin)['access_token'])")
          for ep in items suppliers purchase-requisitions purchase-orders contracts rfqs; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "http://localhost:8900/api/v1/$ep")
            if [ "$STATUS" != "200" ]; then echo "❌ /api/v1/$ep → $STATUS"; exit 1; fi
            echo "✓ /api/v1/$ep → 200"
          done
      - name: Teardown
        if: always()
        working-directory: deploy
        run: docker compose down -v
