<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <defs>
    <style>
      .pri { fill: var(--color-primary-500, #8B5E3C); }
      .sec { fill: var(--color-primary-200, #D8C3B1); }
      .acc { fill: var(--color-primary-700, #543824); }
      .bg  { fill: var(--color-bg-subtle, #F7F6F5); }
      .ln  { stroke: var(--color-primary-700, #543824); fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Soft bg blob -->
  <ellipse class="bg" cx="120" cy="130" rx="90" ry="85" opacity="0.4" />

  <!-- Body -->
  <ellipse class="pri" cx="120" cy="155" rx="52" ry="42" />

  <!-- Belly patch -->
  <ellipse class="sec" cx="120" cy="160" rx="35" ry="28" />

  <!-- Head -->
  <circle class="pri" cx="120" cy="105" r="36" />

  <!-- Ears -->
  <circle class="pri" cx="90" cy="78" r="11" />
  <circle class="sec" cx="90" cy="78" r="6" />
  <circle class="pri" cx="150" cy="78" r="11" />
  <circle class="sec" cx="150" cy="78" r="6" />

  <!-- Face patch -->
  <ellipse class="sec" cx="120" cy="112" rx="22" ry="16" />

  <!-- Nose -->
  <ellipse class="acc" cx="120" cy="108" rx="5" ry="3.5" />

  <!-- Closed eyes (sleeping / peaceful) -->
  <path class="ln" d="M104,100 Q108,105 112,100" stroke-width="2.5" />
  <path class="ln" d="M128,100 Q132,105 136,100" stroke-width="2.5" />

  <!-- Gentle mouth -->
  <path class="ln" d="M115,115 Q120,119 125,115" stroke-width="1.8" />

  <!-- Arms resting on belly -->
  <path class="pri" d="M78,145 C68,150 65,165 75,170 L90,162 Z" />
  <path class="pri" d="M162,145 C172,150 175,165 165,170 L150,162 Z" />

  <!-- Paws (hands on belly) -->
  <circle class="sec" cx="92" cy="158" r="7" />
  <circle class="sec" cx="148" cy="158" r="7" />

  <!-- Feet -->
  <ellipse class="acc" cx="98" cy="192" rx="14" ry="7" />
  <ellipse class="acc" cx="142" cy="192" rx="14" ry="7" />

  <!-- Tail -->
  <path class="pri" d="M72,175 C55,182 48,195 58,200 C68,205 78,195 82,185 Z" />

  <!-- Floating shapes (empty state hint) -->
  <rect class="sec" x="170" y="55" width="12" height="12" rx="2" opacity="0.5" transform="rotate(15 176 61)" />
  <circle class="sec" cx="185" cy="80" r="5" opacity="0.4" />
  <rect class="sec" x="55" y="50" width="10" height="10" rx="2" opacity="0.35" transform="rotate(-12 60 55)" />

  <!-- Zzz -->
  <g class="acc" font-family="Inter, sans-serif" font-weight="600" opacity="0.6">
    <text x="155" y="72" font-size="11">z</text>
    <text x="165" y="58" font-size="14">z</text>
    <text x="178" y="42" font-size="17">Z</text>
  </g>
</svg>
