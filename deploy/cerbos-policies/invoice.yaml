---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "invoice"
  rules:
    - actions: ["read:*"]
      effect: EFFECT_ALLOW
      roles: ["admin", "finance_auditor", "procurement_mgr"]

    - actions: ["read:id", "read:internal_number", "read:invoice_number",
                "read:po_id", "read:supplier_id", "read:invoice_date",
                "read:total_amount", "read:currency", "read:status",
                "read:created_at"]
      effect: EFFECT_ALLOW
      roles: ["it_buyer"]

    - actions: ["read:id", "read:internal_number", "read:invoice_number",
                "read:po_id", "read:invoice_date", "read:total_amount",
                "read:currency", "read:status"]
      effect: EFFECT_ALLOW
      roles: ["dept_manager"]
