---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: "default"
  resource: "payment_record"
  rules:
    - actions: ["read:*"]
      effect: EFFECT_ALLOW
      roles: ["admin", "finance_auditor", "procurement_mgr"]

    - actions: ["read:id", "read:payment_number", "read:po_id",
                "read:installment_no", "read:amount", "read:currency",
                "read:due_date", "read:payment_date", "read:status",
                "read:created_at", "read:updated_at"]
      effect: EFFECT_ALLOW
      roles: ["it_buyer"]

    - actions: ["read:id", "read:payment_number", "read:po_id",
                "read:installment_no", "read:amount", "read:currency",
                "read:status", "read:created_at"]
      effect: EFFECT_ALLOW
      roles: ["dept_manager"]
