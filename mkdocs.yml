site_name: Mica 觅采 · 文档中心
site_description: 觅采采购管理系统 · 用户手册 & 管理员指南
site_author: Mica Contributors
site_url: https://helixzz.github.io/mica/
repo_url: https://github.com/helixzz/mica
repo_name: helixzz/mica
edit_uri: edit/main/docs/user-manual/

docs_dir: docs/user-manual
site_dir: _site

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: deep-orange
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: deep-orange
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - 中文:
    - 首页: README.md
    - 用户手册:
      - 概述: 00-introduction.md
      - 角色与权限: 01-roles-and-permissions.md
      - 全局业务工作流: 02-global-workflow.md
      - 各角色工作流: 03-per-role-workflow.md
      - 功能参考: 04-features.md
      - 常见问题: 05-faq.md
    - 管理员指南:
      - 导读: admin/00-overview.md
      - 部署与运维: admin/01-deployment-and-ops.md
      - HTTPS / TLS: admin/02-https-and-tls.md
      - 系统管理控制台: admin/03-system-console.md
      - SAML SSO: admin/04-saml-sso.md
      - 权限架构: admin/05-permissions.md
      - 备份与恢复: admin/06-backup-restore.md
      - 故障排查与升级: admin/07-troubleshooting-and-upgrade.md
    - 附录:
      - 流程图集: _diagrams.md
  - English:
    - Home: en/README.md
    - User Manual:
      - Introduction: en/00-introduction.md
      - Roles and Permissions: en/01-roles-and-permissions.md
      - Global Workflow: en/02-global-workflow.md
      - Per-Role Workflows: en/03-per-role-workflow.md
      - Feature Reference: en/04-features.md
      - FAQ: en/05-faq.md
    - Admin Guide:
      - Overview: en/admin/00-overview.md
      - Deployment and Operations: en/admin/01-deployment-and-ops.md
      - HTTPS / TLS: en/admin/02-https-and-tls.md
      - System Console: en/admin/03-system-console.md
      - SAML SSO: en/admin/04-saml-sso.md
      - Permission Model: en/admin/05-permissions.md
      - Backup and Restore: en/admin/06-backup-restore.md
      - Troubleshooting and Upgrade: en/admin/07-troubleshooting-and-upgrade.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.emoji

plugins:
  - search:
      lang:
        - zh
        - en

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/helixzz/mica
  generator: false

extra_css:
  - assets/mica.css

copyright: >
  Copyright &copy; 2026 Mica Contributors ·
  Licensed under Apache 2.0
